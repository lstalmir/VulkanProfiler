  - Top_Level_Triage.l1tex__t_sector_pipe_tex_mem_texture_op_tex_hit_rate:
      ratio:
        expr: l1tex__t_sectors_pipe_tex_mem_texture_op_tex_lookup_hit_realtime, RollupOp.avg, l1tex__t_sectors_pipe_tex_mem_texture_op_tex_realtime, RollupOp.avg
        maxRate: 1.0
  - Top_Level_Triage.l1tex__t_sectors_op_other_lookup_hit:
      counter:
        expr: l1tex__t_sectors_lookup_hit - (l1tex__t_sectors_pipe_lsu_mem_global_op_ld_lookup_hit_realtime + l1tex__t_sectors_pipe_lsu_mem_global_op_st_lookup_hit_realtime + l1tex__t_sectors_pipe_lsu_mem_local_op_ld_lookup_hit_realtime + l1tex__t_sectors_pipe_lsu_mem_local_op_st_lookup_hit_realtime + l1tex__t_sectors_pipe_tex_mem_texture_op_ld_lookup_hit_realtime + l1tex__t_sectors_pipe_tex_mem_texture_op_tex_lookup_hit_realtime + l1tex__t_sectors_pipe_tex_mem_surface_op_ld_lookup_hit_realtime + l1tex__t_sectors_pipe_tex_mem_surface_op_st_lookup_hit_realtime)
        sustainedRate: 16.0
  - Top_Level_Triage.l1tex__t_sectors_pipe_lsu_mem_global_op_ld_lookup_miss_realtime:
      counter:
        expr: l1tex__t_sectors_pipe_lsu_mem_global_op_ld_realtime - l1tex__t_sectors_pipe_lsu_mem_global_op_ld_lookup_hit_realtime
        sustainedRate: 16.0
  - Top_Level_Triage.l1tex__t_sectors_pipe_lsu_mem_global_op_st_lookup_miss_realtime:
