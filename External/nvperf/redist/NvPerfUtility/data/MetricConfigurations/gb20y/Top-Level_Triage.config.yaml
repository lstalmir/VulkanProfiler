        sustainedRate: 16.0
  - Top_Level_Triage.l1tex__t_sectors_pipe_tex_mem_texture_op_ld_lookup_miss_realtime:
      counter:
        expr: l1tex__t_sectors_pipe_tex_mem_texture_op_ld_realtime - l1tex__t_sectors_pipe_tex_mem_texture_op_ld_lookup_hit_realtime
        sustainedRate: 16.0
  - Top_Level_Triage.l1tex__t_sectors_pipe_tex_mem_texture_op_tex_lookup_miss_realtime:
