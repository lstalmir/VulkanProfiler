        maxRate: 1.0
  - Top_Level_Triage.l1tex__t_sector_pipe_tex_mem_surface_op_ld_hit_rate:
      ratio:
        expr: l1tex__t_sectors_pipe_tex_mem_surface_op_ld_lookup_hit_realtime, RollupOp.avg, l1tex__t_sectors_pipe_tex_mem_surface_op_ld_realtime, RollupOp.avg
        maxRate: 1.0
  - Top_Level_Triage.l1tex__t_sector_pipe_tex_mem_surface_op_st_hit_rate:
      ratio:
        expr: l1tex__t_sectors_pipe_tex_mem_surface_op_st_lookup_hit_realtime, RollupOp.avg, l1tex__t_sectors_pipe_tex_mem_surface_op_st_realtime, RollupOp.avg
